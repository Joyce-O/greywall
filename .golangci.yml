version: "2"
run:
  modules-download-mode: readonly
linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
  settings:
    gocritic:
      disabled-checks:
        - singleCaseSwitch
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/GreyhavenHQ/greywall)
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/GreyhavenHQ/greywall
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
